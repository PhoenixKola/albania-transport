name: update-data

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 * * *"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ingest/package-lock.json

      - name: Install ingest deps
        run: npm ci
        working-directory: ingest

      - name: Run ingest
        run: npm run ingest
        working-directory: ingest
        env:
          GTFS_URL: ${{ vars.GTFS_URL }}

      - name: Commit data changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data
          git diff --cached --quiet || git commit -m "chore(data): update feed"
          git diff --cached --quiet || git push